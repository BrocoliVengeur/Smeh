<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lecteur Audio</title>
  <style>
    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a24;
      --card:      #22222f;
      --accent:    #7c5cfc;
      --accent2:   #c084fc;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --border:    #2e2e3e;
      --playing:   #7c5cfc22;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    nav {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
      transition: color .2s;
    }
    nav a:hover { color: var(--accent2); }
    nav span { color: var(--border); }
    nav .current { color: var(--text); font-weight: 600; }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 2rem;
      text-align: center;
    }

    /* ── Player card ── */
    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px #0008;
      margin-bottom: 1.5rem;
    }

    .cover {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      overflow: hidden;
      position: relative;
    }
    .cover svg { width: 72px; opacity: .35; }
    .cover .bars {
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 60px;
    }
    .cover .bar {
      width: 8px;
      background: rgba(255,255,255,.7);
      border-radius: 4px;
      animation: bounce 1s ease-in-out infinite;
    }
    .cover .bar:nth-child(2){animation-delay:.1s}
    .cover .bar:nth-child(3){animation-delay:.2s}
    .cover .bar:nth-child(4){animation-delay:.15s}
    .cover .bar:nth-child(5){animation-delay:.05s}
    @keyframes bounce {
      0%,100%{height:15px}
      50%{height:55px}
    }
    .cover.paused .bar { animation-play-state: paused; }

    .track-info { text-align: center; margin-bottom: 1.4rem; }
    .track-name {
      font-size: 1.15rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-sub { color: var(--muted); font-size: .85rem; margin-top: .25rem; }

    /* Progress */
    .progress-wrap {
      margin-bottom: 1.2rem;
    }
    .times {
      display: flex;
      justify-content: space-between;
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 9px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--accent2)44;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
    }
    .btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s, background .2s;
    }
    .btn:hover { color: var(--text); background: var(--border); }
    .btn.active { color: var(--accent2); }
    .btn-play {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      width: 56px; height: 56px;
      border-radius: 50%;
      font-size: 1.3rem;
      box-shadow: 0 4px 20px var(--accent)66;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-play:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 28px var(--accent)99;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: .7rem;
      margin-top: 1.3rem;
    }
    .volume-row svg { color: var(--muted); flex-shrink: 0; }
    .volume-row input { flex: 1; }

    /* ── Playlist ── */
    .playlist-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      overflow: hidden;
      box-shadow: 0 20px 60px #0008;
      margin-bottom: 1.5rem;
    }
    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .playlist-header span { color: var(--accent2); }

    .playlist { list-style: none; max-height: 300px; overflow-y: auto; }
    .playlist::-webkit-scrollbar { width: 4px; }
    .playlist::-webkit-scrollbar-track { background: transparent; }
    .playlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .playlist li {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .75rem 1.2rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border)88;
      transition: background .15s;
    }
    .playlist li:last-child { border-bottom: none; }
    .playlist li:hover { background: var(--card); }
    .playlist li.active { background: var(--playing); }
    .playlist li.active .pl-name { color: var(--accent2); }

    .pl-num {
      width: 22px;
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .pl-icon { flex-shrink: 0; color: var(--accent); display: none; }
    .playlist li.active .pl-icon { display: block; }
    .playlist li.active .pl-num { display: none; }

    .pl-info { flex: 1; min-width: 0; }
    .pl-name {
      font-size: .92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pl-ext {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .1rem;
    }
    .pl-dur { font-size: .8rem; color: var(--muted); flex-shrink: 0; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      text-align: center;
      color: var(--muted);
      font-size: .88rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      margin: .8rem 1.2rem 1rem;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      color: var(--accent2);
    }
    .drop-zone svg { display: block; margin: 0 auto .5rem; }

    footer {
      color: var(--muted);
      font-size: .78rem;
      margin-top: 1rem;
      text-align: center;
    }
    footer a { color: var(--accent2); text-decoration: none; }

    /* No track state */
    .no-track .cover { background: var(--card); }
    .no-track .cover .bars { display: none; }
    .no-track .cover svg.music-icon { display: block !important; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">🏠 Accueil</a>
  <span>›</span>
  <span class="current">🎵 Lecteur Audio</span>
</nav>

<h1>🎵 Lecteur Audio</h1>

<!-- Player -->
<div class="player-card">
  <div class="cover paused" id="cover">
    <!-- music icon when no track -->
    <svg class="music-icon" style="display:none" xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24">
      <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
    </svg>
    <!-- bars when playing -->
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <div class="track-info">
    <div class="track-name" id="trackName">Aucune piste sélectionnée</div>
    <div class="track-sub" id="trackSub">Ajoutez des fichiers ci-dessous</div>
  </div>

  <div class="progress-wrap">
    <div class="times">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
    <input type="range" id="progress" min="0" max="100" value="0" step="0.1"/>
  </div>

  <div class="controls">
    <!-- Shuffle -->
    <button class="btn" id="btnShuffle" title="Aléatoire">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
        <path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
      </svg>
    </button>
    <!-- Prev -->
    <button class="btn" id="btnPrev" title="Précédent">
      <svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24">
        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
      </svg>
    </button>
    <!-- Play/Pause -->
    <button class="btn btn-play" id="btnPlay" title="Lecture / Pause">
      <svg id="iconPlay" width="26" height="26" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" style="display:none" width="26" height="26" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <!-- Next -->
    <button class="btn" id="btnNext" title="Suivant">
      <svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24">
        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
      </svg>
    </button>
    <!-- Repeat -->
    <button class="btn" id="btnRepeat" title="Répéter">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
      </svg>
    </button>
  </div>

  <div class="volume-row">
    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    <input type="range" id="volume" min="0" max="1" step="0.02" value="0.8"/>
  </div>
</div>

<!-- Playlist -->
<div class="playlist-card">
  <div class="playlist-header">
    <span>Playlist</span>
    <span id="plCount">0 titre(s)</span>
  </div>

  <label class="drop-zone" id="dropZone" for="fileInput">
    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
      <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/>
    </svg>
    Glissez vos fichiers <strong>.mp3 / .wav / .ogg / .flac</strong> ici<br/>
    ou cliquez pour parcourir
  </label>
  <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,.flac,audio/*" multiple style="display:none"/>

  <ul class="playlist" id="playlist"></ul>
</div>

<footer>
  Lecteur Audio &mdash; <a href="index.html">← Retour à l'accueil</a>
</footer>

<audio id="audio"></audio>

<script>
  const audio    = document.getElementById('audio');
  const cover    = document.getElementById('cover');
  const btnPlay  = document.getElementById('btnPlay');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause= document.getElementById('iconPause');
  const btnPrev  = document.getElementById('btnPrev');
  const btnNext  = document.getElementById('btnNext');
  const btnShuffle= document.getElementById('btnShuffle');
  const btnRepeat = document.getElementById('btnRepeat');
  const progress = document.getElementById('progress');
  const volume   = document.getElementById('volume');
  const trackName= document.getElementById('trackName');
  const trackSub = document.getElementById('trackSub');
  const curTime  = document.getElementById('currentTime');
  const durEl    = document.getElementById('duration');
  const playlist = document.getElementById('playlist');
  const plCount  = document.getElementById('plCount');
  const dropZone = document.getElementById('dropZone');
  const fileInput= document.getElementById('fileInput');

  let tracks = [];       // {name, ext, url, duration}
  let current = -1;
  let shuffle = false;
  let repeat  = false;
  let isPlaying = false;

  /* ── Helpers ── */
  const fmt = s => {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  };

  function setPlayState(playing) {
    isPlaying = playing;
    iconPlay.style.display  = playing ? 'none' : '';
    iconPause.style.display = playing ? '' : 'none';
    cover.classList.toggle('paused', !playing);
    cover.querySelector('.music-icon').style.display = tracks.length ? 'none' : '';
  }

  function updateInfo() {
    if (current < 0 || !tracks[current]) {
      trackName.textContent = 'Aucune piste sélectionnée';
      trackSub.textContent  = 'Ajoutez des fichiers ci-dessous';
      cover.classList.add('no-track');
      return;
    }
    const t = tracks[current];
    trackName.textContent = t.name;
    trackSub.textContent  = t.ext.toUpperCase() + (t.duration ? ' · ' + fmt(t.duration) : '');
    cover.classList.remove('no-track');
    cover.querySelector('.music-icon').style.display = 'none';
  }

  function renderPlaylist() {
    playlist.innerHTML = '';
    plCount.textContent = `${tracks.length} titre(s)`;
    tracks.forEach((t, i) => {
      const li = document.createElement('li');
      li.className = i === current ? 'active' : '';
      li.innerHTML = `
        <span class="pl-num">${i+1}</span>
        <span class="pl-icon">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
          </svg>
        </span>
        <div class="pl-info">
          <div class="pl-name">${t.name}</div>
          <div class="pl-ext">${t.ext.toUpperCase()}</div>
        </div>
        <span class="pl-dur">${t.duration ? fmt(t.duration) : '--:--'}</span>`;
      li.addEventListener('click', () => loadTrack(i, true));
      playlist.appendChild(li);
    });
  }

  function loadTrack(idx, autoPlay = false) {
    current = idx;
    const t = tracks[idx];
    audio.src = t.url;
    audio.load();
    updateInfo();
    renderPlaylist();
    if (autoPlay) { audio.play().catch(()=>{}); setPlayState(true); }
    else setPlayState(false);
  }

  /* ── Add files ── */
  function addFiles(files) {
    [...files].forEach(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const url = URL.createObjectURL(f);
      const name = f.name.replace(/\.[^.]+$/, '');
      const obj = { name, ext, url, duration: null };
      tracks.push(obj);
      // pre-load duration
      const tmp = new Audio(url);
      tmp.addEventListener('loadedmetadata', () => {
        obj.duration = tmp.duration;
        if (tracks.indexOf(obj) === current) updateInfo();
        renderPlaylist();
      });
    });
    if (current < 0 && tracks.length) loadTrack(0, false);
    renderPlaylist();
  }

  fileInput.addEventListener('change', e => addFiles(e.target.files));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  /* ── Playback ── */
  btnPlay.addEventListener('click', () => {
    if (!tracks.length) return;
    if (current < 0) loadTrack(0, true);
    else if (isPlaying) { audio.pause(); setPlayState(false); }
    else { audio.play().catch(()=>{}); setPlayState(true); }
  });

  btnPrev.addEventListener('click', () => {
    if (!tracks.length) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    let idx = shuffle ? rand() : (current - 1 + tracks.length) % tracks.length;
    loadTrack(idx, isPlaying);
  });

  btnNext.addEventListener('click', () => {
    if (!tracks.length) return;
    let idx = shuffle ? rand() : (current + 1) % tracks.length;
    loadTrack(idx, isPlaying);
  });

  btnShuffle.addEventListener('click', () => {
    shuffle = !shuffle;
    btnShuffle.classList.toggle('active', shuffle);
  });

  btnRepeat.addEventListener('click', () => {
    repeat = !repeat;
    btnRepeat.classList.toggle('active', repeat);
  });

  audio.addEventListener('ended', () => {
    if (repeat) { audio.currentTime = 0; audio.play(); return; }
    if (current < tracks.length - 1 || shuffle) {
      let idx = shuffle ? rand() : current + 1;
      loadTrack(idx, true);
    } else setPlayState(false);
  });

  /* ── Progress ── */
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progress.value = (audio.currentTime / audio.duration) * 100;
    curTime.textContent = fmt(audio.currentTime);
    durEl.textContent   = fmt(audio.duration);
  });

  progress.addEventListener('input', () => {
    if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
  });

  /* ── Volume ── */
  audio.volume = 0.8;
  volume.addEventListener('input', () => audio.volume = volume.value);

  /* ── Utils ── */
  const rand = () => {
    let r; do { r = Math.floor(Math.random()*tracks.length); } while(r===current && tracks.length>1);
    return r;
  };

  // init cover state
  cover.classList.add('no-track');
  cover.querySelector('.music-icon').style.display = '';
  cover.querySelector('.bars').style.display = 'none';
</script>
</body>
</html>
