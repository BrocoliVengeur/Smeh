<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lecteur Audio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a24;
      --card:      #22222f;
      --accent:    #7c5cfc;
      --accent2:   #c084fc;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --border:    #2e2e3e;
      --playing:   #7c5cfc22;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      /* Marge pour la barre de navigation en bas */
      padding-bottom: 100px;
    }

    /* ── STYLE DE LA NAV BAR ── */
    #smeh-nav { 
        position:fixed; bottom:0; left:0; right:0; height:60px;
        background:rgba(10,10,10,.95); backdrop-filter:blur(12px);
        border-top:0.5px solid rgba(255,255,255,.07);
        display:flex; align-items:center; justify-content:space-around; z-index:1000; 
    }
    .snav-item { 
        flex:1; display:flex; flex-direction:column; align-items:center;
        gap:3px; text-decoration:none; color:#555; transition:color .2s; padding:8px 0; 
    }
    .snav-item.active { color:#f0ede8; }
    .snav-item i { font-size:22px; }
    .snav-item span { font-size:10px; letter-spacing:.3px; }

    .player-container {
      width: 100%;
      max-width: 450px;
      margin-top: 1rem;
    }

    /* ── Art Cover ── */
    .art-wrapper {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      background: var(--surface);
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }
    .art-wrapper img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .art-wrapper.playing img { transform: scale(1.05); }

    /* ── Info ── */
    .track-info { text-align: center; margin-bottom: 2rem; }
    .track-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
    .track-artist { color: var(--muted); font-size: 1rem; letter-spacing: 0.5px; }

    /* ── Controls ── */
    .controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .btn {
      background: none; border: none; color: var(--text);
      cursor: pointer; font-size: 1.2rem; transition: 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn:hover { color: var(--accent); }
    .btn-main {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 50%; color: #fff; font-size: 1.8rem;
      box-shadow: 0 8px 20px rgba(124, 92, 252, 0.3);
    }
    .btn-main:hover { transform: scale(1.05); background: var(--accent2); }
    .btn.active { color: var(--accent); }

    /* ── Progress ── */
    .progress-area { margin-bottom: 2rem; }
    input[type="range"] {
      width: 100%; height: 6px;
      background: var(--border);
      border-radius: 3px; outline: none;
      cursor: pointer; appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 14px; height: 14px;
      background: var(--accent); border-radius: 50%;
    }
    .time-labels {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: var(--muted); margin-top: 0.8rem;
    }

    /* ── Playlist ── */
    .playlist {
      background: var(--surface);
      border-radius: 20px; padding: 1rem;
      border: 1px solid var(--border);
    }
    .playlist-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.8rem; border-radius: 12px;
      cursor: pointer; transition: 0.2s;
    }
    .playlist-item:hover { background: rgba(255,255,255,0.05); }
    .playlist-item.active { background: var(--playing); border-left: 3px solid var(--accent); }
    .pl-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
    .pl-info { flex: 1; }
    .pl-title { font-size: 0.9rem; font-weight: 600; display: block; }
    .pl-artist { font-size: 0.75rem; color: var(--muted); }

    /* Volume */
    .volume-box { display: flex; align-items: center; gap: 10px; margin-top: 1.5rem; padding: 0 1rem; }
    .volume-box i { color: var(--muted); font-size: 1rem; }

  </style>
</head>
<body>

  <nav id="smeh-nav">
      <a class="snav-item" href="index.html"><i class="ti ti-home"></i><span>Accueil</span></a>
      <a class="snav-item" href="scroll.html"><i class="ti ti-photo"></i><span>Tikigram</span></a>
      <a class="snav-item active" href="musique.html"><i class="ti ti-music"></i><span>Musique</span></a>
      <a class="snav-item" href="video.html"><i class="ti ti-video"></i><span>Vidéos</span></a>
      <a class="snav-item" href="geo.html"><i class="ti ti-world"></i><span>Géo Jeu</span></a>
      <a class="snav-item" href="feedback_page.html"><i class="ti ti-bulb"></i><span>Idées</span></a>
  </nav>

  <div class="player-container">
    <div class="art-wrapper" id="artWrapper">
      <img id="cover" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500&q=80" alt="Cover">
    </div>

    <div class="track-info">
      <h1 class="track-title" id="title">Titre Audio</h1>
      <p class="track-artist" id="artist">Artiste Inconnu</p>
    </div>

    <div class="progress-area">
      <input type="range" id="progress" value="0" step="0.1">
      <div class="time-labels">
        <span id="curTime">0:00</span>
        <span id="dur">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnShuffle" title="Aléatoire"><i class="ti ti-arrows-shuffle"></i></button>
      <button class="btn" id="btnPrev"><i class="ti ti-player-skip-back-filled"></i></button>
      <button class="btn btn-main" id="btnPlay"><i class="ti ti-player-play-filled" id="playIcon"></i></button>
      <button class="btn" id="btnNext"><i class="ti ti-player-skip-forward-filled"></i></button>
      <button class="btn" id="btnRepeat" title="Répéter"><i class="ti ti-repeat"></i></button>
    </div>

    <div class="volume-box">
      <i class="ti ti-volume-2"></i>
      <input type="range" id="volume" value="0.8" min="0" max="1" step="0.05">
    </div>

    <div style="margin-top: 2.5rem;">
      <h3 style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem;">Ma Playlist</h3>
      <div class="playlist" id="playlist">
        </div>
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
    const tracks = [
      { title: "Latino GANG", artist: "Brocoli Beatz", src: "/sons/Latino-gang.mp3", cover: "https://preview.redd.it/yasmina-khan-v0-dmp29mvlflpe1.jpeg?auto=webp&s=62f91d2405bb8f2b43227c0601f003adc10a961e" },
      { title: "Summer Vibe", artist: "Chill Beats", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://images.unsplash.com/photo-1459749411177-042180ce673c?w=500&q=80" },
      { title: "Midnight City", artist: "Synthwave", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500&q=80" }
    ];

    let current = 0, isPlaying = false, shuffle = false, repeat = false;
    const audio = document.getElementById('audio'), playBtn = document.getElementById('btnPlay'),
          playIcon = document.getElementById('playIcon'), title = document.getElementById('title'),
          artist = document.getElementById('artist'), cover = document.getElementById('cover'),
          progress = document.getElementById('progress'), curTime = document.getElementById('curTime'),
          durEl = document.getElementById('dur'), playlistEl = document.getElementById('playlist'),
          btnShuffle = document.getElementById('btnShuffle'), btnRepeat = document.getElementById('btnRepeat'),
          volume = document.getElementById('volume'), artWrapper = document.getElementById('artWrapper');

    function loadTrack(idx, playImmediately = false) {
      current = idx;
      const t = tracks[idx];
      title.textContent = t.title;
      artist.textContent = t.artist;
      cover.src = t.cover;
      audio.src = t.src;
      updatePlaylistUI();
      if (playImmediately) { isPlaying = true; audio.play(); setPlayState(true); }
    }

    function setPlayState(play) {
      isPlaying = play;
      playIcon.className = play ? "ti ti-player-pause-filled" : "ti ti-player-play-filled";
      artWrapper.classList.toggle('playing', play);
    }

    function updatePlaylistUI() {
      playlistEl.innerHTML = tracks.map((t, i) => `
        <div class="playlist-item ${i===current?'active':''}" onclick="loadTrack(${i}, true)">
          <img src="${t.cover}" class="pl-thumb">
          <div class="pl-info">
            <span class="pl-title">${t.title}</span>
            <span class="pl-artist">${t.artist}</span>
          </div>
          ${i===current ? '<i class="ti ti-chart-bar" style="color:var(--accent)"></i>' : ''}
        </div>
      `).join('');
    }

    /* ── Handlers ── */
    playBtn.addEventListener('click', () => {
      if (isPlaying) audio.pause(); else audio.play();
      setPlayState(!isPlaying);
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      let idx = current > 0 ? current - 1 : tracks.length - 1;
      loadTrack(idx, isPlaying);
    });

    document.getElementById('btnNext').addEventListener('click', () => {
      let idx = shuffle ? rand() : (current + 1) % tracks.length;
      loadTrack(idx, isPlaying);
    });

    btnShuffle.addEventListener('click', () => {
      shuffle = !shuffle;
      btnShuffle.classList.toggle('active', shuffle);
    });

    btnRepeat.addEventListener('click', () => {
      repeat = !repeat;
      btnRepeat.classList.toggle('active', repeat);
    });

    audio.addEventListener('ended', () => {
      if (repeat) { audio.currentTime = 0; audio.play(); return; }
      if (current < tracks.length - 1 || shuffle) {
        let idx = shuffle ? rand() : current + 1;
        loadTrack(idx, true);
      } else setPlayState(false);
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      progress.value = (audio.currentTime / audio.duration) * 100;
      curTime.textContent = fmt(audio.currentTime);
      durEl.textContent   = fmt(audio.duration);
    });

    progress.addEventListener('input', () => {
      if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
    });

    audio.volume = 0.8;
    volume.addEventListener('input', () => audio.volume = volume.value);

    const rand = () => {
      let r; do { r = Math.floor(Math.random()*tracks.length); } while(r === current);
      return r;
    };
    const fmt = (s) => {
      let m = Math.floor(s/60), sec = Math.floor(s%60);
      return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    };

    loadTrack(0);
  </script>
</body>
</html>
