<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Drapeaux du Monde</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1923;
            --card: #1a2636;
            --border: #243447;
            --accent: #f5a623;
            --accent2: #e8534a;
            --success: #2ecc71;
            --error: #e74c3c;
            --text: #eaf0fb;
            --muted: #7a92a8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── HEADER ── */
        header {
            width: 100%;
            background: linear-gradient(135deg, #0f1923 0%, #1a2636 60%, #0f1923 100%);
            border-bottom: 2px solid var(--accent);
            padding: 28px 20px 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(245,166,35,0.12) 0%, transparent 70%);
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.4rem, 8vw, 5rem);
            letter-spacing: 6px;
            color: var(--text);
            position: relative;
            line-height: 1;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
            position: relative;
        }

        /* ── LAYOUT ── */
        .main {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            padding: 32px 20px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
        }

        /* ── GAME BOX ── */
        .game-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            flex: 1 1 480px;
            max-width: 560px;
        }

        .question {
            font-size: 1.1rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .country-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 6vw, 3rem);
            letter-spacing: 3px;
            color: var(--text);
            margin-bottom: 24px;
            min-height: 56px;
        }

        .flags-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .flag-option {
            cursor: pointer;
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 3/2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111d2a;
            transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
            position: relative;
        }

        .flag-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .flag-option:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(245,166,35,0.18);
        }

        .flag-option.correct {
            border-color: var(--success) !important;
            box-shadow: 0 0 18px rgba(46,204,113,0.4);
        }

        .flag-option.wrong {
            border-color: var(--error) !important;
            box-shadow: 0 0 18px rgba(231,76,60,0.4);
            animation: shake 0.35s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* ── SCORE BAR ── */
        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .score-item {
            text-align: center;
        }

        .score-item label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .score-item .val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        /* feedback overlay */
        .feedback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .flag-option.correct .feedback,
        .flag-option.wrong .feedback { opacity: 1; }

        /* ── LEADERBOARD ── */
        .leaderboard {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            flex: 0 1 240px;
            min-width: 200px;
            align-self: flex-start;
        }

        .leaderboard h2 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 3px;
            font-size: 1.4rem;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lb-list {
            list-style: none;
        }

        .lb-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .lb-list li:last-child { border-bottom: none; }

        .lb-rank {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            width: 22px;
            text-align: center;
            color: var(--muted);
        }

        .lb-rank.gold { color: #f5a623; }
        .lb-rank.silver { color: #b0c0d0; }
        .lb-rank.bronze { color: #cd7f32; }

        .lb-score {
            margin-left: auto;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: var(--text);
            letter-spacing: 1px;
        }

        .lb-empty {
            color: var(--muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 20px 0;
        }

        /* reset flash */
        @keyframes flashRed {
            0% { background: rgba(231,76,60,0.15); }
            100% { background: var(--card); }
        }

        .game-box.reset-flash {
            animation: flashRed 0.6s ease forwards;
        }

        /* ── STREAK badge ── */
        .streak-badge {
            display: inline-block;
            background: var(--accent);
            color: #0f1923;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 8px;
            vertical-align: middle;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .streak-badge.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <h1>JEU <span>DRAPEAUX</span> DU MONDE</h1>
    <p>Teste tes connaissances géographiques</p>
</header>

<div class="main">

    <div class="game-box" id="game-box">
        <div class="question">Trouve le drapeau de</div>
        <div class="country-name" id="target-country">…</div>

        <div class="flags-grid" id="flags-container"></div>

        <div class="score-bar">
            <div class="score-item">
                <label>Score actuel</label>
                <div class="val" id="score-val">0</div>
            </div>
            <div class="score-item">
                <label>Meilleur</label>
                <div class="val" id="best-val">0</div>
            </div>
            <div class="score-item">
                <label>Questions</label>
                <div class="val" id="total-val">0</div>
            </div>
        </div>
    </div>

    <div class="leaderboard">
        <h2>🏆 Top Scores</h2>
        <ul class="lb-list" id="lb-list">
            <li><span class="lb-empty">Aucun score encore.</span></li>
        </ul>
    </div>

</div>

<script>
// ── TOUS LES PAYS DU MONDE ──
const countries = [
    {name:"Afghanistan",code:"af"},{name:"Albanie",code:"al"},{name:"Algérie",code:"dz"},
    {name:"Andorre",code:"ad"},{name:"Angola",code:"ao"},{name:"Antigua-et-Barbuda",code:"ag"},
    {name:"Argentine",code:"ar"},{name:"Arménie",code:"am"},{name:"Australie",code:"au"},
    {name:"Autriche",code:"at"},{name:"Azerbaïdjan",code:"az"},{name:"Bahamas",code:"bs"},
    {name:"Bahreïn",code:"bh"},{name:"Bangladesh",code:"bd"},{name:"Barbade",code:"bb"},
    {name:"Biélorussie",code:"by"},{name:"Belgique",code:"be"},{name:"Belize",code:"bz"},
    {name:"Bénin",code:"bj"},{name:"Bhoutan",code:"bt"},{name:"Bolivie",code:"bo"},
    {name:"Bosnie-Herzégovine",code:"ba"},{name:"Botswana",code:"bw"},{name:"Brésil",code:"br"},
    {name:"Brunei",code:"bn"},{name:"Bulgarie",code:"bg"},{name:"Burkina Faso",code:"bf"},
    {name:"Burundi",code:"bi"},{name:"Cabo Verde",code:"cv"},{name:"Cambodge",code:"kh"},
    {name:"Cameroun",code:"cm"},{name:"Canada",code:"ca"},{name:"Centrafrique",code:"cf"},
    {name:"Chili",code:"cl"},{name:"Chine",code:"cn"},{name:"Chypre",code:"cy"},
    {name:"Colombie",code:"co"},{name:"Comores",code:"km"},{name:"Congo",code:"cg"},
    {name:"Costa Rica",code:"cr"},{name:"Côte d'Ivoire",code:"ci"},{name:"Croatie",code:"hr"},
    {name:"Cuba",code:"cu"},{name:"Danemark",code:"dk"},{name:"Djibouti",code:"dj"},
    {name:"Dominique",code:"dm"},{name:"Rép. dominicaine",code:"do"},{name:"Équateur",code:"ec"},
    {name:"Égypte",code:"eg"},{name:"El Salvador",code:"sv"},{name:"Émirats arabes unis",code:"ae"},
    {name:"Érythrée",code:"er"},{name:"Espagne",code:"es"},{name:"Estonie",code:"ee"},
    {name:"Eswatini",code:"sz"},{name:"États-Unis",code:"us"},{name:"Éthiopie",code:"et"},
    {name:"Fidji",code:"fj"},{name:"Finlande",code:"fi"},{name:"France",code:"fr"},
    {name:"Gabon",code:"ga"},{name:"Gambie",code:"gm"},{name:"Géorgie",code:"ge"},
    {name:"Ghana",code:"gh"},{name:"Grèce",code:"gr"},{name:"Grenade",code:"gd"},
    {name:"Guatemala",code:"gt"},{name:"Guinée",code:"gn"},{name:"Guinée-Bissau",code:"gw"},
    {name:"Guinée équatoriale",code:"gq"},{name:"Guyana",code:"gy"},{name:"Haïti",code:"ht"},
    {name:"Honduras",code:"hn"},{name:"Hongrie",code:"hu"},{name:"Îles Marshall",code:"mh"},
    {name:"Îles Salomon",code:"sb"},{name:"Inde",code:"in"},{name:"Indonésie",code:"id"},
    {name:"Irak",code:"iq"},{name:"Iran",code:"ir"},{name:"Irlande",code:"ie"},
    {name:"Islande",code:"is"},{name:"Israël",code:"il"},{name:"Italie",code:"it"},
    {name:"Jamaïque",code:"jm"},{name:"Japon",code:"jp"},{name:"Jordanie",code:"jo"},
    {name:"Kazakhstan",code:"kz"},{name:"Kenya",code:"ke"},{name:"Kirghizistan",code:"kg"},
    {name:"Kiribati",code:"ki"},{name:"Kosovo",code:"xk"},{name:"Koweït",code:"kw"},
    {name:"Laos",code:"la"},{name:"Lesotho",code:"ls"},{name:"Lettonie",code:"lv"},
    {name:"Liban",code:"lb"},{name:"Liberia",code:"lr"},{name:"Libye",code:"ly"},
    {name:"Liechtenstein",code:"li"},{name:"Lituanie",code:"lt"},{name:"Luxembourg",code:"lu"},
    {name:"Madagascar",code:"mg"},{name:"Malawi",code:"mw"},{name:"Maldives",code:"mv"},
    {name:"Malaisie",code:"my"},{name:"Mali",code:"ml"},{name:"Malte",code:"mt"},
    {name:"Maroc",code:"ma"},{name:"Maurice",code:"mu"},{name:"Mauritanie",code:"mr"},
    {name:"Mexique",code:"mx"},{name:"Micronésie",code:"fm"},{name:"Moldavie",code:"md"},
    {name:"Monaco",code:"mc"},{name:"Mongolie",code:"mn"},{name:"Monténégro",code:"me"},
    {name:"Mozambique",code:"mz"},{name:"Myanmar",code:"mm"},{name:"Namibie",code:"na"},
    {name:"Nauru",code:"nr"},{name:"Népal",code:"np"},{name:"Nicaragua",code:"ni"},
    {name:"Niger",code:"ne"},{name:"Nigeria",code:"ng"},{name:"Niue",code:"nu"},
    {name:"Norvège",code:"no"},{name:"Nouvelle-Zélande",code:"nz"},{name:"Oman",code:"om"},
    {name:"Ouganda",code:"ug"},{name:"Ouzbékistan",code:"uz"},{name:"Pakistan",code:"pk"},
    {name:"Palaos",code:"pw"},{name:"Palestine",code:"ps"},{name:"Panama",code:"pa"},
    {name:"Papouasie-Nvl-Guinée",code:"pg"},{name:"Paraguay",code:"py"},{name:"Pays-Bas",code:"nl"},
    {name:"Pérou",code:"pe"},{name:"Philippines",code:"ph"},{name:"Pologne",code:"pl"},
    {name:"Portugal",code:"pt"},{name:"Qatar",code:"qa"},{name:"Rép. dem. du Congo",code:"cd"},
    {name:"Rép. tchèque",code:"cz"},{name:"Roumanie",code:"ro"},{name:"Royaume-Uni",code:"gb"},
    {name:"Russie",code:"ru"},{name:"Rwanda",code:"rw"},{name:"Saint-Kitts-et-Nevis",code:"kn"},
    {name:"Saint-Marin",code:"sm"},{name:"Saint-Vincent",code:"vc"},{name:"Sainte-Lucie",code:"lc"},
    {name:"Samoa",code:"ws"},{name:"São Tomé-et-Príncipe",code:"st"},{name:"Sénégal",code:"sn"},
    {name:"Serbie",code:"rs"},{name:"Seychelles",code:"sc"},{name:"Sierra Leone",code:"sl"},
    {name:"Singapour",code:"sg"},{name:"Slovaquie",code:"sk"},{name:"Slovénie",code:"si"},
    {name:"Somalie",code:"so"},{name:"Soudan",code:"sd"},{name:"Soudan du Sud",code:"ss"},
    {name:"Sri Lanka",code:"lk"},{name:"Suède",code:"se"},{name:"Suisse",code:"ch"},
    {name:"Suriname",code:"sr"},{name:"Syrie",code:"sy"},{name:"Tadjikistan",code:"tj"},
    {name:"Tanzanie",code:"tz"},{name:"Tchad",code:"td"},{name:"Thaïlande",code:"th"},
    {name:"Timor oriental",code:"tl"},{name:"Togo",code:"tg"},{name:"Tonga",code:"to"},
    {name:"Trinité-et-Tobago",code:"tt"},{name:"Tunisie",code:"tn"},{name:"Turkménistan",code:"tm"},
    {name:"Turquie",code:"tr"},{name:"Tuvalu",code:"tv"},{name:"Ukraine",code:"ua"},
    {name:"Uruguay",code:"uy"},{name:"Vanuatu",code:"vu"},{name:"Vatican",code:"va"},
    {name:"Venezuela",code:"ve"},{name:"Vietnam",code:"vn"},{name:"Yémen",code:"ye"},
    {name:"Zambie",code:"zm"},{name:"Zimbabwe",code:"zw"}
];

const MAX_SCORES = 8;
let score = 0;
let totalAnswered = 0;
let currentCorrectAnswer = null;
let locked = false;

// ── BEST SCORES (localStorage) ──
function getScores() {
    try { return JSON.parse(localStorage.getItem('flagScores') || '[]'); }
    catch { return []; }
}

function saveScore(s) {
    if (s === 0) return;
    const scores = getScores();
    scores.push(s);
    scores.sort((a, b) => b - a);
    localStorage.setItem('flagScores', JSON.stringify(scores.slice(0, MAX_SCORES)));
    renderLeaderboard();
}

function renderLeaderboard() {
    const scores = getScores();
    const list = document.getElementById('lb-list');
    if (!scores.length) {
        list.innerHTML = '<li><span class="lb-empty">Aucun score encore.</span></li>';
        return;
    }
    const medals = ['gold','silver','bronze'];
    list.innerHTML = scores.map((s, i) => `
        <li>
            <span class="lb-rank ${medals[i] || ''}">${i+1}</span>
            <span>${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '🎯'} Score</span>
            <span class="lb-score">${s}</span>
        </li>
    `).join('');
}

function updateBestDisplay() {
    const scores = getScores();
    document.getElementById('best-val').textContent = scores[0] || 0;
}

// ── GAME ──
function initGame() {
    locked = false;
    const shuffled = [...countries].sort(() => 0.5 - Math.random());
    const selection = shuffled.slice(0, 4);
    currentCorrectAnswer = selection[Math.floor(Math.random() * 4)];
    document.getElementById('target-country').textContent = currentCorrectAnswer.name;

    const container = document.getElementById('flags-container');
    container.innerHTML = '';

    selection.forEach(country => {
        const div = document.createElement('div');
        div.className = 'flag-option';
        div.innerHTML = `
            <img src="https://flagcdn.com/w320/${country.code}.png" alt="Drapeau de ${country.name}" loading="lazy">
            <div class="feedback"></div>
        `;
        div.onclick = () => checkAnswer(country, div);
        container.appendChild(div);
    });
}

function checkAnswer(country, element) {
    if (locked) return;
    locked = true;

    if (country.code === currentCorrectAnswer.code) {
        element.classList.add('correct');
        element.querySelector('.feedback').textContent = '✓';
        score++;
        totalAnswered++;
        document.getElementById('score-val').textContent = score;
        document.getElementById('total-val').textContent = totalAnswered;
        setTimeout(initGame, 700);
    } else {
        element.classList.add('wrong');
        element.querySelector('.feedback').textContent = '✗';

        // show correct answer
        document.querySelectorAll('.flag-option').forEach(opt => {
            const img = opt.querySelector('img');
            if (img && img.src.includes(`/${currentCorrectAnswer.code}.png`)) {
                opt.classList.add('correct');
                opt.querySelector('.feedback').textContent = '✓';
            }
        });

        setTimeout(() => {
            // save score before reset
            saveScore(score);
            updateBestDisplay();

            // flash game box
            const box = document.getElementById('game-box');
            box.classList.add('reset-flash');
            setTimeout(() => box.classList.remove('reset-flash'), 600);

            score = 0;
            totalAnswered = 0;
            document.getElementById('score-val').textContent = 0;
            document.getElementById('total-val').textContent = 0;
            initGame();
        }, 1200);
    }
}

// ── INIT ──
renderLeaderboard();
updateBestDisplay();
initGame();
</script>
</body>
</html>
