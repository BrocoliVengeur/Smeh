<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Géo - À Venir</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary-color);
        }

        /* Bannière À Venir */
        .header-banner {
            width: 100%;
            padding: 60px 20px;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            color: white;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header-banner h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }

        .header-banner p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Conteneur du Jeu */
        .game-container {
            width: 90%;
            max-width: 1000px;
            margin: 40px 0;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Iframe Responsive */
        .iframe-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 56.25%; /* Ratio 16:9 */
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header class="header-banner">
        <h1>À VENIR</h1>
        <p>Le nouveau portail géographique arrive bientôt</p>
    </header>

    <div class="game-container">
        <center><h2 class="game-title">Entraînez-vous avec les drapeaux</h2></center>
        
        <div class="iframe-wrapper">
            <iframe src="https://www.seterra.com/fr/vgp/3069?custom=1" 
                    allowfullscreen>
            </iframe>
        </div>
        
        <p style="text-align: center; font-style: italic; color: #666;">
            Astuce : Cliquez sur le drapeau correspondant au pays demandé !
        </p>
    </div>

    <footer>
        &copy; 2026 - Projet Géo Démo
    </footer>

</body>
</html>
