<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smeh Ibiza 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090f;--text:#f0ede8;--muted:rgba(240,237,232,.35);--border:rgba(255,255,255,.07);--accent:#c9a96e}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Georgia',serif;overflow-x:hidden}

body{
  /* Marge pour la barre de navigation en bas */
  padding-bottom: 80px;
}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.6;
}

/* ── STYLE DE LA NAV BAR UNIFIÉE ── */
#smeh-nav { 
    position:fixed; bottom:0; left:0; right:0; height:60px;
    background:rgba(10,10,10,.95); backdrop-filter:blur(12px);
    border-top:0.5px solid rgba(255,255,255,.07);
    display:flex; align-items:center; justify-content:space-around; z-index:1000; 
}
.snav-item { 
    flex:1; display:flex; flex-direction:column; align-items:center;
    gap:3px; text-decoration:none; color:#555; transition:color .2s; padding:8px 0; 
}
.snav-item.active { color:#f0ede8; }
.snav-item i { font-size:22px; }
.snav-item span { font-size:10px; letter-spacing:.3px; font-family: sans-serif; }

/* HEADER */
header{
  position:relative;z-index:10;padding:40px 20px;
  display:flex;justify-content:center;align-items:center;
}
.brand{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);opacity:0.8}

/* HERO */
.hero{
  position:relative;z-index:10;text-align:center;padding:60px 20px 100px;
  max-width:800px;margin:0 auto;
}
.hero h1{font-size:clamp(40px,12vw,90px);font-weight:400;line-height:1;margin-bottom:20px;font-style:italic}
.hero p{font-size:18px;color:var(--muted);max-width:500px;margin:0 auto 40px;line-height:1.6}

/* DOG BUTTON */
.dog-container{position:relative;display:inline-block;cursor:pointer;margin-bottom:40px}
.dog-img{width:120px;height:120px;border-radius:50%;border:1px solid var(--border);padding:5px;transition:transform .4s cubic-bezier(.17,.67,.83,.67)}
.dog-container:hover .dog-img{transform:scale(1.05) rotate(5deg)}
.status-dot{position:absolute;bottom:10px;right:10px;width:12px;height:12px;background:#55efc4;border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 15px rgba(85,239,196,0.5)}

/* FLOATING ELEMENTS */
#floaters{position:fixed;inset:0;pointer-events:none;z-index:1}
.floater{position:absolute;font-size:var(--size-desktop);opacity:0;white-space:nowrap;user-select:none;animation:float var(--dur) linear var(--delay) infinite}

@keyframes float{
  0%{transform:translateY(110vh) rotate(var(--rot));opacity:0}
  10%{opacity:0.4}
  90%{opacity:0.4}
  100%{transform:translateY(-20vh) rotate(var(--rotEnd));opacity:0}
}

/* BARKS */
.bark{position:fixed;z-index:100;pointer-events:none;font-size:14px;font-weight:bold;color:var(--accent);text-shadow:0 0 10px rgba(201,169,110,0.3)}

@media (max-width:600px){
  .hero h1{font-size:50px}
  .floater{font-size:var(--size-mobile)}
}
</style>
</head>
<body>

<nav id="smeh-nav">
    <a class="snav-item active" href="index.html"><i class="ti ti-home"></i><span>Accueil</span></a>
    <a class="snav-item" href="scroll.html"><i class="ti ti-photo"></i><span>Tikigram</span></a>
    <a class="snav-item" href="musique.html"><i class="ti ti-music"></i><span>Musique</span></a>
    <a class="snav-item" href="video.html"><i class="ti ti-video"></i><span>Vidéos</span></a>
    <a class="snav-item" href="geo.html"><i class="ti ti-world"></i><span>Géo Jeu</span></a>
    <a class="snav-item" href="feedback_page.html"><i class="ti ti-bulb"></i><span>Idées</span></a>
</nav>

<div id="floaters"></div>

<header>
  <div class="brand">Est. 2026 • Ibiza</div>
</header>

<main class="hero">
  <div class="dog-container" id="dogBtn">
    <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=400" alt="Smeh" class="dog-img">
    <div class="status-dot"></div>
  </div>
  
  <h1>L'Expérience Smeh</h1>
  <p>Une collection privée de moments, de sons et de visions capturés sous le soleil d'Ibiza.</p>
</main>

<script>
// FLOATING CONTENT (Words & Icons)
const words = ["Smeh","Ibiza","2026","Love","Sun","Vibes","Chill","✨","🌊","🌴","🍹"];
const colors = ["#c9a96e","#8e8e93","#f0ede8","#555"];
const fonts = ["'Georgia', serif", "sans-serif", "serif"];
const floatersEl = document.getElementById('floaters');

document.addEventListener('DOMContentLoaded', () => {
  words.forEach((word, index) => {
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = word;
    
    // Random settings
    const x = Math.random() * 100 + '%';
    const dur = 15 + Math.random() * 20;
    const delay = -(Math.random() * 20) + 's';
    const rot = Math.random() * 40 - 20;
    const rotEnd = rot + (Math.random() * 60 - 30);
    const sizeDesktop = (Math.random() * 20 + 12).toFixed(1) + 'px'; // 12–32px
    const sizeMobile  = (Math.random() * 13 + 9).toFixed(1) + 'px';  // 9–22px

    const color = colors[Math.floor(Math.random() * colors.length)];
    const font  = fonts[Math.floor(Math.random() * fonts.length)];

    f.style.cssText = `
      --x:${x};
      left:${x};
      --dur:${dur}s;
      --delay:${delay};
      --rot:${rot}deg;
      --rotEnd:${rotEnd}deg;
      --size-desktop:${sizeDesktop};
      --size-mobile:${sizeMobile};
      color:${color};
      font-family:${font};
    `;

    floatersEl.appendChild(f);
  });
});

// DOG CLICK — burst barks
const barks = ["OUAF","OUAF OUAF","🐾","👑","WOOF","Boulèche !!","Le roi 🐶"];
document.getElementById('dogBtn').addEventListener('click', () => {
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'bark';
    el.textContent = barks[Math.floor(Math.random() * barks.length)];
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2 - 80;
    
    // Position aléatoire autour du clic
    const tx = (Math.random() - 0.5) * 200;
    const ty = (Math.random() - 0.5) * 200 - 50;
    
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.position = 'fixed';
    el.style.transition = 'all 1s ease-out';
    el.style.opacity = '1';
    
    document.body.appendChild(el);

    setTimeout(() => {
      el.style.transform = `translate(${tx}px, ${ty}px) scale(1.5)`;
      el.style.opacity = '0';
    }, 10);

    setTimeout(() => el.remove(), 1000);
  }
});
</script>

</body>
</html>
