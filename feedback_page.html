
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.page{display:flex;min-height:520px;gap:0;padding:2rem 1.5rem;align-items:flex-start}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:2rem}
.sidebar{width:260px;padding-left:1.5rem;border-left:0.5px solid var(--color-border-tertiary);min-height:400px;flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.feedback-box{background:#7a1c1c;border-radius:var(--border-radius-lg);padding:2rem;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(120,20,20,0.18)}
.feedback-box h2{color:#fcd5d5;font-size:18px;font-weight:500;margin-bottom:.4rem}
.feedback-box p{color:#e8a8a8;font-size:13px;margin-bottom:1.25rem;line-height:1.5}
textarea{width:100%;min-height:130px;border-radius:var(--border-radius-md);border:0.5px solid rgba(255,180,180,0.3);background:rgba(255,255,255,0.06);color:#fff;font-family:var(--font-sans);font-size:14px;padding:.75rem 1rem;resize:vertical;outline:none;transition:border .2s}
textarea::placeholder{color:rgba(255,200,200,0.45)}
textarea:focus{border-color:rgba(255,180,180,0.7);background:rgba(255,255,255,0.09)}
.send-btn{margin-top:.875rem;width:100%;padding:.65rem 1rem;background:#c0392b;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s}
.send-btn:hover{background:#a93226}
.send-btn:active{transform:scale(0.98)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.toast{display:none;margin-top:.75rem;background:rgba(255,255,255,0.1);border-radius:var(--border-radius-md);padding:.5rem .875rem;color:#fce4e4;font-size:13px;text-align:center}
.toast.show{display:block}
.empty-hint{font-size:13px;color:var(--color-text-tertiary);font-style:italic;margin-top:.5rem}
.idea-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:.625rem .875rem;margin-bottom:.625rem;animation:slideIn .25s ease}
.idea-item .idea-text{font-size:13px;color:var(--color-text-primary);line-height:1.5;word-break:break-word}
.idea-item .idea-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:.3rem}
.idea-count{display:inline-flex;align-items:center;justify-content:center;background:#c0392b;color:#fff;font-size:11px;font-weight:500;border-radius:99px;padding:1px 7px;margin-left:6px;vertical-align:middle}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>

<h2 class="sr-only">Page de suggestions – formulaire d'idées et liste en temps réel</h2>

<div class="page">
  <div class="center">
    <div class="feedback-box">
      <h2><i class="ti ti-bulb" aria-hidden="true" style="font-size:18px;margin-right:6px;vertical-align:-2px"></i>Proposer une idée</h2>
      <p>Tu as une suggestion pour améliorer le site ? Partage-la, elle apparaîtra dans la liste à côté.</p>
      <textarea id="ideaInput" placeholder="Ex : ajouter un mode sombre, améliorer le formulaire de contact…" maxlength="500"></textarea>
      <div style="text-align:right;margin-top:4px"><span id="charCount" style="font-size:11px;color:rgba(255,180,180,0.6)">0 / 500</span></div>
      <button class="send-btn" id="sendBtn" onclick="submitIdea()">
        <i class="ti ti-send" aria-hidden="true"></i> Envoyer l'idée
      </button>
      <div class="toast" id="toast"><i class="ti ti-check" aria-hidden="true"></i> Merci ! Ton idée a bien été enregistrée.</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">
      <i class="ti ti-list" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>
      Idées reçues <span class="idea-count" id="ideaCount">0</span>
    </div>
    <div id="ideaList">
      <p class="empty-hint">Aucune idée pour l'instant.<br>Sois le premier !</p>
    </div>
  </div>
</div>

<script>
const ideas = [];
const input = document.getElementById('ideaInput');
const list = document.getElementById('ideaList');
const count = document.getElementById('ideaCount');
const toast = document.getElementById('toast');
const btn = document.getElementById('sendBtn');
const charCount = document.getElementById('charCount');

input.addEventListener('input', () => {
  charCount.textContent = input.value.length + ' / 500';
});

function submitIdea() {
  const text = input.value.trim();
  if (!text) return;
  btn.disabled = true;
  const now = new Date();
  const meta = now.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit'}) + ' à ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
  ideas.unshift({text, meta});
  renderList();
  input.value = '';
  charCount.textContent = '0 / 500';
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); btn.disabled = false; }, 2200);
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitIdea();
});

function renderList() {
  count.textContent = ideas.length;
  if (!ideas.length) { list.innerHTML = '<p class="empty-hint">Aucune idée pour l\'instant.<br>Sois le premier !</p>'; return; }
  list.innerHTML = ideas.map((idea, i) => `
    <div class="idea-item">
      <div class="idea-text">${escHtml(idea.text)}</div>
      <div class="idea-meta"><i class="ti ti-clock" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>${idea.meta} · idée #${ideas.length - i}</div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
