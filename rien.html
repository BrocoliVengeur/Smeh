*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script>
/* ── BACKGROUND SLIDESHOW ── */
const slides = document.querySelectorAll('.bg-slide');
const dots = document.querySelectorAll('.dot');
const progressBar = document.getElementById('bg-progress');
let bgIdx = 0;
const BG_INTERVAL = 10000;

function nextBg() {
slides[bgIdx].classList.remove('active');
dots[bgIdx].classList.remove('active');
bgIdx = (bgIdx + 1) % slides.length;
slides[bgIdx].classList.add('active');
dots[bgIdx].classList.add('active');
}

// Progress bar animation
let progressStart = null;
function animateProgress(ts) {
if (!progressStart) progressStart = ts;
const elapsed = ts - progressStart;
const pct = Math.min((elapsed / BG_INTERVAL) * 100, 100);
progressBar.style.width = pct + '%';
if (pct < 100) {
requestAnimationFrame(animateProgress);
} else {
progressBar.style.transition = 'width 0.3s ease';
progressBar.style.width = '0%';
setTimeout(() => {
progressBar.style.transition = 'none';
progressStart = null;
requestAnimationFrame(animateProgress);
}, 300);
}
}
requestAnimationFrame(animateProgress);
setInterval(nextBg, BG_INTERVAL);

/* ── SNAKE GAME ── */
const canvas = document.getElementById('snake-canvas');
const ctx = canvas.getContext('2d');
const GRID = 20; // cells
const CELL = canvas.width / GRID; // px per cell = 20

const scoreEl = document.getElementById('score');
const hiScoreEl = document.getElementById('hi-score');
const overlay = document.getElementById('overlay');
const finalScoreEl = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');

let snake, dir, nextDir, food, score, hiScore = 0, gameLoop, alive;

function initGame() {
snake = [
{x:10, y:10},
{x:9, y:10},
{x:8, y:10},
];
dir = {x:1, y:0};
nextDir = {x:1, y:0};
score = 0;
alive = true;
scoreEl.textContent = '0';
overlay.classList.remove('show');
spawnFood();
if (gameLoop) clearInterval(gameLoop);
gameLoop = setInterval(tick, 120);
draw();
}

function spawnFood() {
let pos;
do {
pos = {
x: Math.floor(Math.random() * GRID),
y: Math.floor(Math.random() * GRID)
};
} while (snake.some(s => s.x === pos.x && s.y === pos.y));
food = pos;
}

function tick() {
if (!alive) return;
dir = { ...nextDir };
const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

// Wall collision (wrap)
// Actually: hard wall
if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
endGame(); return;
}
// Self collision
if (snake.some(s => s.x === head.x && s.y === head.y)) {
endGame(); return;
}

snake.unshift(head);

if (head.x === food.x && head.y === food.y) {
score++;
scoreEl.textContent = score;
if (score > hiScore) { hiScore = score; hiScoreEl.textContent = hiScore; }
spawnFood();
} else {
snake.pop();
}
draw();
}

function endGame() {
alive = false;
clearInterval(gameLoop);
finalScoreEl.textContent = score;
overlay.classList.add('show');
drawDead();
}

/* ── RENDERING ── */
function draw() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

// Grid subtile
ctx.strokeStyle = 'rgba(255,255,255,0.04)';
ctx.lineWidth = 0.5;
for (let i = 0; i <= GRID; i++) {
ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
}

// Food — pulsing glow done via draw, not animation
const t = Date.now() / 600;
const pulse = 0.7 + 0.3 * Math.sin(t);
ctx.save();
ctx.shadowColor = 'rgba(255,107,107,' + (pulse * 0.8) + ')';
ctx.shadowBlur = 10 * pulse;
ctx.fillStyle = '#ff6b6b';
const fr = (CELL * 0.38) * pulse;
ctx.beginPath();
ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, fr, 0, Math.PI*2);
ctx.fill();
ctx.restore();

// Snake
snake.forEach((seg, i) => {
const ratio = 1 - (i / snake.length) * 0.5;
if (i === 0) {
// Head
ctx.save();
ctx.shadowColor = 'rgba(168,255,120,0.6)';
ctx.shadowBlur = 10;
ctx.fillStyle = '#a8ff78';
roundRect(ctx, seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, 4);
ctx.fill();
ctx.restore();
// Eyes
ctx.fillStyle = 'rgba(0,0,0,0.7)';
const eyeOffsets = getEyeOffsets(dir);
eyeOffsets.forEach(off => {
ctx.beginPath();
ctx.arc(seg.x*CELL + off.x, seg.y*CELL + off.y, 2, 0, Math.PI*2);
ctx.fill();
});
} else {
ctx.save();
ctx.globalAlpha = 0.5 + 0.5 * ratio;
ctx.fillStyle = `hsl(${120 + i*2}, 65%, ${40 + ratio*20}%)`;
roundRect(ctx, seg.x*CELL+2, seg.y*CELL+2, CELL-4, CELL-4, 3);
ctx.fill();
ctx.restore();
}
});

// Schedule next food pulse
requestAnimationFrame(() => { if (alive) drawFoodPulse(); });
}

function drawFoodPulse() {
// Redraw only the food area for smooth pulse
ctx.clearRect(food.x*CELL, food.y*CELL, CELL, CELL);
// Redraw grid in that cell
ctx.strokeStyle = 'rgba(255,255,255,0.04)';
ctx.lineWidth = 0.5;
for (let i = 0; i <= 1; i++) {
ctx.beginPath(); ctx.moveTo((food.x+i)*CELL, food.y*CELL); ctx.lineTo((food.x+i)*CELL, (food.y+1)*CELL); ctx.stroke();
ctx.beginPath(); ctx.moveTo(food.x*CELL, (food.y+i)*CELL); ctx.lineTo((food.x+1)*CELL, (food.y+i)*CELL); ctx.stroke();
}
const t = Date.now() / 600;
const pulse = 0.7 + 0.3 * Math.sin(t);
ctx.save();
ctx.shadowColor = 'rgba(255,107,107,' + (pulse * 0.8) + ')';
ctx.shadowBlur = 10 * pulse;
ctx.fillStyle = '#ff6b6b';
const fr = (CELL * 0.38) * pulse;
ctx.beginPath();
ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, fr, 0, Math.PI*2);
ctx.fill();
ctx.restore();
if (alive) requestAnimationFrame(() => drawFoodPulse());
}

function drawDead() {
ctx.save();
ctx.fillStyle = 'rgba(255,107,107,0.15)';
snake.forEach(seg => {
roundRect(ctx, seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, 3);
ctx.fill();
});
ctx.restore();
}

function getEyeOffsets(d) {
if (d.x === 1) return [{x: CELL-5, y: 5}, {x: CELL-5, y: CELL-5}];
if (d.x === -1) return [{x: 5, y: 5}, {x: 5, y: CELL-5}];
if (d.y === -1) return [{x: 5, y: 5}, {x: CELL-5, y: 5}];
return [{x: 5, y: CELL-5}, {x: CELL-5, y: CELL-5}];
}

function roundRect(ctx, x, y, w, h, r) {
ctx.beginPath();
ctx.moveTo(x+r, y);
ctx.lineTo(x+w-r, y);
ctx.quadraticCurveTo(x+w, y, x+w, y+r);
ctx.lineTo(x+w, y+h-r);
ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
ctx.lineTo(x+r, y+h);
ctx.quadraticCurveTo(x, y+h, x, y+h-r);
ctx.lineTo(x, y+r);
ctx.quadraticCurveTo(x, y, x+r, y);
ctx.closePath();
}

/* ── CONTROLS ── */
document.addEventListener('keydown', e => {
const map = {
ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
z:{x:0,y:-1}, Z:{x:0,y:-1},
s:{x:0,y:1}, S:{x:0,y:1},
q:{x:-1,y:0}, Q:{x:-1,y:0},
d:{x:1,y:0}, D:{x:1,y:0},
};
const nd = map[e.key];
if (nd) {
// Prevent 180° reversal
if (nd.x !== -dir.x || nd.y !== -dir.y) {
nextDir = nd;
}
if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
e.preventDefault();
}
}
});

restartBtn.addEventListener('click', initGame);

/* ── START ── */
initGame();
</script>
