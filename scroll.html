<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tikigram</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;
    --text:#f0f0f0;--muted:#555;--accent:#e91e8c;--accent2:#9b59b6;
    --like:#e74c3c;--gold:#f1c40f;--nav-h:60px;--top-h:56px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

  /* TOP BAR */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:var(--top-h);
    background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;
    border-bottom:0.5px solid rgba(255,255,255,.05);
  }
  .logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(45deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .top-btns{display:flex;gap:16px;color:var(--text);font-size:20px}

  /* BOTTOM NAV UNIFIÉ */
  #smeh-nav { 
    position:fixed; bottom:0; left:0; right:0; height:60px;
    background:rgba(10,10,10,.95); backdrop-filter:blur(12px);
    border-top:0.5px solid rgba(255,255,255,.07);
    display:flex; align-items:center; justify-content:space-around; z-index:1000; 
  }
  .snav-item { 
    flex:1; display:flex; flex-direction:column; align-items:center;
    gap:3px; text-decoration:none; color:#555; transition:color .2s; padding:8px 0; 
  }
  .snav-item.active { color:#f0ede8; }
  .snav-item i { font-size:22px; }
  .snav-item span { font-size:10px; letter-spacing:.3px; }

  /* FEED CONTAINER */
  #feed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
  #feed::-webkit-scrollbar{display:none}

  .card{
    position:relative;width:100%;height:100%;scroll-snap-align:start;scroll-snap-stop:always;
    display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;
  }

  /* VIDEO / MEDIA */
  .media-container{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  video{width:100%;height:100%;object-fit:cover}

  /* UI OVERLAY */
  .overlay{position:absolute;inset:0;background:linear-gradient(transparent 60%,rgba(0,0,0,0.8));pointer-events:none}
  
  .side-actions{position:absolute;right:12px;bottom:100px;display:flex;flex-direction:column;align-items:center;gap:20px;z-index:10}
  .action-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .action-item i{font-size:28px;text-shadow:0 2px 4px rgba(0,0,0,0.3)}
  .action-item span{font-size:12px;font-weight:600}
  .action-item i.active{color:var(--like);animation:pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)}

  .bottom-info{position:absolute;left:16px;bottom:80px;right:80px;z-index:10}
  .user-tag{font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;font-size:15px}
  .desc{font-size:14px;line-height:1.4;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sound-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:12px;font-size:12px;backdrop-filter:blur(4px)}

  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">TIKIGRAM</div>
  <div class="top-btns">
    <i class="ti ti-search"></i>
    <i class="ti ti-live-photo"></i>
  </div>
</div>

<nav id="smeh-nav">
  <a class="snav-item" href="index.html"><i class="ti ti-home"></i><span>Accueil</span></a>
  <a class="snav-item active" href="scroll.html"><i class="ti ti-photo"></i><span>Tikigram</span></a>
  <a class="snav-item" href="musique.html"><i class="ti ti-music"></i><span>Musique</span></a>
  <a class="snav-item" href="video.html"><i class="ti ti-video"></i><span>Vidéos</span></a>
  <a class="snav-item" href="geo.html"><i class="ti ti-world"></i><span>Géo Jeu</span></a>
  <a class="snav-item" href="feedback_page.html"><i class="ti ti-bulb"></i><span>Idées</span></a>
</nav>

<div id="feed">
  <div class="card" data-pos="0">
    <div class="media-container">
      <video loop playsinline muted src="https://player.vimeo.com/external/371433846.sd.mp4?s=231da6ab57f988498f3053d3d30d36ca89a74421&profile_id=139&oauth2_token_id=57447761"></video>
    </div>
    <div class="overlay"></div>
    <div class="side-actions">
      <div class="action-item"><i class="ti ti-heart-filled like-btn"></i><span>12.4k</span></div>
      <div class="action-item"><i class="ti ti-message-circle-2-filled"></i><span>432</span></div>
      <div class="action-item"><i class="ti ti-share-3-filled"></i><span>Share</span></div>
    </div>
    <div class="bottom-info">
      <div class="user-tag">@Smeh_Ibiza <i class="ti ti-circle-check-filled" style="color:var(--accent)"></i></div>
      <div class="desc">Vibes d'été à Ibiza 2026. Profitez de chaque moment ! #Ibiza #Sunset</div>
      <div class="sound-badge"><i class="ti ti-music"></i> Audio original - Smeh Ibiza</div>
    </div>
  </div>

  <div class="card" data-pos="1">
    <div class="media-container">
      <video loop playsinline muted src="https://player.vimeo.com/external/475130761.sd.mp4?s=d00121175658e4695500e231b5204439c4d9b232&profile_id=139&oauth2_token_id=57447761"></video>
    </div>
    <div class="overlay"></div>
    <div class="side-actions">
      <div class="action-item"><i class="ti ti-heart-filled like-btn"></i><span>8.9k</span></div>
      <div class="action-item"><i class="ti ti-message-circle-2-filled"></i><span>120</span></div>
      <div class="action-item"><i class="ti ti-share-3-filled"></i><span>Share</span></div>
    </div>
    <div class="bottom-info">
      <div class="user-tag">@BeachLife</div>
      <div class="desc">La vie est plus belle au bord de la mer. 🌊✨</div>
      <div class="sound-badge"><i class="ti ti-music"></i> Waves Chill - Deep House</div>
    </div>
  </div>
</div>

<script>
const feed = document.getElementById('feed');
const cards = document.querySelectorAll('.card');
const likes = {};

// Video Observer
const obs = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const vid = entry.target.querySelector('video');
    if (entry.isIntersecting) {
      vid.play().catch(()=>{});
    } else {
      vid.pause();
      vid.currentTime = 0;
    }
  });
}, {threshold: 0.6});

cards.forEach(c => obs.observe(c));

// Like functionality
feed.addEventListener('click', e => {
  if(e.target.classList.contains('like-btn')) {
    const pos = e.target.closest('.card').dataset.pos;
    likes[pos] = !likes[pos];
    e.target.classList.toggle('active', likes[pos]);
  }
});

// Pause/Play on tap
feed.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if(!card || e.target.closest('.side-actions')) return;
  const vid = card.querySelector('video');
  if(vid.paused) vid.play(); else vid.pause();
});
</script>

</body>
</html>
