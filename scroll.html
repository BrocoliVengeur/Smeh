<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Memories</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;
    --text:#f0f0f0;--muted:#555;--accent:#e91e8c;--accent2:#9b59b6;
    --like:#e74c3c;--gold:#f1c40f;--nav-h:60px;--top-h:56px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

  /* TOP BAR */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:var(--top-h);
    background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;z-index:100;border-bottom:0.5px solid var(--border);
  }
  #topbar .logo{font-size:22px;font-weight:700;letter-spacing:-0.5px;
    background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .top-live{
    display:flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);
    border-radius:20px;padding:5px 12px;font-family:-apple-system,sans-serif;
    font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.3px;
  }
  .top-live .dot{
    width:6px;height:6px;border-radius:50%;background:#e91e8c;
    box-shadow:0 0 6px #e91e8c;
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  /* FEED */
  #feed{
    position:fixed;top:var(--top-h);bottom:var(--nav-h);left:0;right:0;
    overflow-y:scroll;scroll-snap-type:y mandatory;
    scrollbar-width:none;-ms-overflow-style:none;
  }
  #feed::-webkit-scrollbar{display:none}

  /* CARD */
  .card{
    height:calc(100vh - var(--top-h) - var(--nav-h));
    scroll-snap-align:start;scroll-snap-stop:always;
    position:relative;display:flex;flex-direction:column;background:#000;
  }

  /* VIDEO */
  .card video{
    width:100%;height:100%;object-fit:contain;display:block;background:#000;
  }

  /* OVERLAY GRADIENT */
  .overlay{
    position:absolute;inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 40%,transparent 70%,rgba(0,0,0,.3) 100%);
    pointer-events:none;
  }

  /* USER INFO */
  .user-info{
    position:absolute;bottom:80px;left:14px;right:70px;
  }
  .username{font-weight:700;font-size:15px;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.8)}
  .caption{font-size:13px;color:rgba(255,255,255,.85);line-height:1.4;text-shadow:0 1px 3px rgba(0,0,0,.8)}
  .caption.clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tags{font-size:12px;color:#a78bfa;margin-top:4px}

  /* DATE BADGE */
  .date-badge{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
    border:0.5px solid rgba(255,255,255,.15);
    border-radius:20px;padding:4px 14px;font-size:12px;color:rgba(255,255,255,.7);
    white-space:nowrap;
  }

  /* SIDE ACTIONS */
  .side-actions{
    position:absolute;bottom:80px;right:12px;
    display:flex;flex-direction:column;align-items:center;gap:18px;
  }
  .action-btn{
    background:none;border:none;cursor:pointer;color:#fff;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    -webkit-user-select:none;user-select:none;
  }
  .action-btn .icon-wrap{
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.1);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;transition:transform .15s,background .2s;
  }
  .action-btn:active .icon-wrap{transform:scale(.88)}
  .action-btn .count{font-size:12px;color:rgba(255,255,255,.8);font-weight:500}

  /* LIKE ANIMATION */
  .action-btn.liked .icon-wrap{background:rgba(231,76,60,.25)}
  .action-btn.liked .ti-heart{color:var(--like)}

  /* HEART BURST */
  .heart-burst{
    position:absolute;font-size:90px;color:var(--like);
    top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    opacity:0;pointer-events:none;z-index:50;
    transition:transform .25s cubic-bezier(.17,.67,.38,1.4),opacity .25s;
  }
  .heart-burst.show{transform:translate(-50%,-50%) scale(1);opacity:1}
  .heart-burst.hide{transform:translate(-50%,-50%) scale(1.3);opacity:0;transition:opacity .3s .2s,transform .3s .2s}

  /* SURPRISE BUTTON */
  .action-btn.surprise .icon-wrap{background:rgba(155,89,182,.3)}
  .surprise-tooltip{
    position:absolute;bottom:calc(var(--nav-h) + 260px);left:50%;transform:translateX(-50%);
    background:var(--surface2);border:0.5px solid var(--accent2);
    border-radius:12px;padding:12px 16px;font-size:13px;text-align:center;
    white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;
    color:var(--text);
  }
  .surprise-tooltip.visible{opacity:1}

  /* BOTTOM NAV */
  #navbar{
    position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
    background:rgba(10,10,10,.95);backdrop-filter:blur(12px);
    border-top:0.5px solid var(--border);
    display:flex;align-items:center;justify-content:space-around;z-index:100;
  }
  .nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;cursor:pointer;padding:8px 0;
    color:var(--muted);transition:color .2s;
    text-decoration:none;
  }
  .nav-item.active{color:var(--text)}
  .nav-item i{font-size:24px}
  .nav-item span{font-size:10px;letter-spacing:.3px}
  .nav-dot{
    width:4px;height:4px;border-radius:50%;background:var(--accent);
    position:absolute;top:6px;
  }
  .nav-item{position:relative}

  /* STORY BAR (fake) */
  .story-bar{
    position:absolute;top:4px;left:8px;right:8px;
    display:flex;gap:3px;z-index:10;
  }
  .story-seg{
    flex:1;height:2px;border-radius:2px;background:rgba(255,255,255,.3);overflow:hidden;
  }
  .story-seg .fill{height:100%;background:#fff;transform-origin:left;transform:scaleX(0)}
  .story-seg.done .fill{transform:scaleX(1)}
  .story-seg.active .fill{animation:progress var(--dur,15s) linear forwards}
  @keyframes progress{from{transform:scaleX(0)}to{transform:scaleX(1)}}

  /* PAUSE INDICATOR */
  .pause-icon{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:60px;color:rgba(255,255,255,.6);opacity:0;pointer-events:none;
    transition:opacity .2s;z-index:30;
  }
  .card.paused .pause-icon{opacity:1}

  /* SOUND BADGE */
  .sound-badge{
    position:absolute;top:14px;right:14px;
    background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
    border-radius:50%;width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:16px;color:rgba(255,255,255,.8);
    border:0.5px solid rgba(255,255,255,.15);
  }

  /* MEMORY TAG */
  .memory-tag{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(233,30,140,.15);border:0.5px solid rgba(233,30,140,.4);
    border-radius:20px;padding:3px 10px;font-size:11px;color:#f472b6;margin-top:6px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header id="topbar">
  <span class="logo">tikigram</span>
  <div class="top-live">
    <div class="dot"></div>
    ibiza 2026
  </div>
</header>

<!-- FEED -->
<main id="feed"></main>

<!-- SURPRISE TOOLTIP -->
<div class="surprise-tooltip" id="surpriseTooltip"></div>

<!-- BOTTOM NAV -->


<nav id="navbar">
  <a class="nav-item" href="index.html"><i class="ti ti-home"></i><span>Accueil</span></a>
  <a class="nav-item active" href="scroll.html"><i class="ti ti-photo"></i><span>Tikigram</span></a>
  <a class="nav-item" href="musique.html"><i class="ti ti-music"></i><span>Musique</span></a>
  <a class="nav-item" href="video.html"><i class="ti ti-video"></i><span>Vidéos</span></a>
  <a class="nav-item" href="geo.html"><i class="ti ti-world"></i><span>Géo Jeu</span></a>
  <a class="nav-item" href="feedback_page.html"><i class="ti ti-bulb"></i><span>Idées</span></a>
</nav>


<script>
// Vidéos : x (1).mp4 → x (64).mp4
const videoItems = Array.from({length:64},(_,i)=>({type:'video', src:`video/x (${i+1}).mp4`}));
// Photos : x (1).JPG → x (14).JPG
const photoItems = Array.from({length:14},(_,i)=>({type:'photo', src:`video/x (${i+1}).JPG`}));
// Mélange tout
const allItems = [...videoItems, ...photoItems];

const CAPTIONS = [
  'Ce soir-là on savait pas que c\'était la dernière fois 🥂',
  'Vacances, refaire le monde jusqu\'à 4h du mat',
  'La lumière de cet après-midi était parfaite',
  'Avant que tout change. On était heureux sans le savoir.',
  'Ce fou rire dont on se souvient encore',
  'Trop fort ce moment 🔥',
  'La June forever',
  'Brocoli Beatz était là',
  'Le son il tue',
  'Tiki Tiki 🌴',
  'Ibiza 2026 🥹',
  'On refait ça quand ?',
  'Carbo à 5h du mat\'',
  'Gnaegnagny',
  'BBL comme jamais',
];
const TAGS = [
  '#souvenir #amis #ibiza','#vacances #mer #nostalgie','#été #2026 #memories',
  '#smeh #ibiza','#friends #feu #brocoli','#flashback #tiki','#june #vibes',
];
const USERS = ['@smeh_ibiza','@boulèche_officiel','@tikigram','@laref2026','@archives_ibiza'];
const DATES = ['Ibiza, été 2026','Ibiza 2026','Été 2026','Juillet 2026','Août 2026'];

const SURPRISES = [
  '🎲 Souvenir aléatoire !','🌀 Tu remontes dans le temps…',
  '💫 Souvenir surprise !','🎬 Rewind !','✨ Moment rare déterré',
];

let muted = true;
let likes = {};
let currentCard = 0;
const feed = document.getElementById('feed');

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

const order = shuffle(allItems);

function buildCards(){
  order.forEach((item, pos)=>{
    const caption = CAPTIONS[Math.floor(Math.random()*CAPTIONS.length)];
    const tags    = TAGS[Math.floor(Math.random()*TAGS.length)];
    const user    = USERS[Math.floor(Math.random()*USERS.length)];
    const date    = DATES[Math.floor(Math.random()*DATES.length)];
    const likes_n = Math.floor(Math.random()*800)+50;

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.pos = pos;
    card.dataset.type = item.type;

    const mediaEl = item.type === 'video'
      ? `<video src="${item.src}" playsinline loop muted preload="metadata"></video>`
      : `<img src="${item.src}" alt="souvenir" style="width:100%;height:100%;object-fit:contain;background:#000;display:block">`;

    card.innerHTML = `
      <div class="story-bar">
        ${order.map((_,i)=>`<div class="story-seg${i<pos?' done':i===pos?' active':''}" style="--dur:15s"><div class="fill"></div></div>`).join('')}
      </div>
      ${mediaEl}
      <div class="overlay"></div>
      <div class="pause-icon"><i class="ti ti-player-pause" aria-hidden="true"></i></div>
      <div class="date-badge"><i class="ti ti-calendar-event" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>${date}</div>
      ${item.type === 'video' ? `<div class="sound-badge" data-card="${pos}"><i class="ti ti-volume-off"></i></div>` : ''}
      <div class="user-info">
        <div class="username">${user}</div>
        <div class="caption clamp" style="display:none"></div>
        <div class="tags" style="display:none"></div>
        <div class="memory-tag"><i class="ti ti-heart-filled" style="font-size:11px"></i> Souvenir</div>
      </div>
      <div class="side-actions">
        <button class="action-btn like-btn" data-card="${pos}" aria-label="Liker">
          <div class="icon-wrap"><i class="ti ti-heart"></i></div>
          <span class="count">${likes_n}</span>
        </button>
        <button class="action-btn" aria-label="Commenter">
          <div class="icon-wrap"><i class="ti ti-message-circle"></i></div>
          <span class="count">Comm.</span>
        </button>
        <button class="action-btn" aria-label="Partager">
          <div class="icon-wrap"><i class="ti ti-send"></i></div>
          <span class="count">Partager</span>
        </button>
        <button class="action-btn surprise" data-card="${pos}" aria-label="Surprise">
          <div class="icon-wrap"><i class="ti ti-wand"></i></div>
          <span class="count">Magie</span>
        </button>
      </div>
      <div class="heart-burst"><i class="ti ti-heart-filled"></i></div>
    `;
    feed.appendChild(card);
  });
}

buildCards();

const cards = ()=>[...feed.querySelectorAll('.card')];

function getVideo(card){return card.querySelector('video')}

function playCard(card){
  if(card.dataset.type !== 'video') return;
  const vid = getVideo(card);
  if(!vid) return;
  vid.muted = muted;
  vid.play().catch(()=>{});
}
function pauseCard(card){
  if(card.dataset.type !== 'video') return;
  const vid = getVideo(card);
  if(vid) vid.pause();
}

function updateMute(card){
  if(card.dataset.type !== 'video') return;
  const vid = getVideo(card);
  if(!vid) return;
  vid.muted = muted;
  const btn = card.querySelector('.sound-badge');
  if(!btn) return;
  btn.innerHTML = muted ? '<i class="ti ti-volume-off"></i>' : '<i class="ti ti-volume"></i>';
}

let io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      currentCard = parseInt(e.target.dataset.pos);
      playCard(e.target);
      e.target.classList.remove('paused');
    } else {
      pauseCard(e.target);
    }
  });
},{threshold:0.6});

cards().forEach(c=>io.observe(c));

// Like
feed.addEventListener('click',e=>{
  const lb = e.target.closest('.like-btn');
  if(lb){
    const pos = lb.dataset.card;
    const count = lb.querySelector('.count');
    const wrap = lb.querySelector('.icon-wrap i');
    const card = feed.querySelector(`.card[data-pos="${pos}"]`);
    const burst = card.querySelector('.heart-burst');
    const curLikes = parseInt(count.textContent)||0;
    if(likes[pos]){
      likes[pos]=false;
      lb.classList.remove('liked');
      wrap.className='ti ti-heart';
      count.textContent=curLikes-1;
    } else {
      likes[pos]=true;
      lb.classList.add('liked');
      wrap.className='ti ti-heart-filled';
      count.textContent=curLikes+1;
      burst.classList.add('show');
      setTimeout(()=>{burst.classList.remove('show');burst.classList.add('hide')},600);
      setTimeout(()=>burst.classList.remove('hide'),1000);
    }
    return;
  }

  // Sound
  const sb = e.target.closest('.sound-badge');
  if(sb){
    muted=!muted;
    cards().forEach(c=>updateMute(c));
    return;
  }

  // Surprise
  const surp = e.target.closest('.surprise');
  if(surp){
    const tip = document.getElementById('surpriseTooltip');
    tip.textContent = SURPRISES[Math.floor(Math.random()*SURPRISES.length)];
    tip.classList.add('visible');
    setTimeout(()=>tip.classList.remove('visible'),2000);
    const rndPos = Math.floor(Math.random()*5);
    const target = feed.querySelectorAll('.card')[rndPos];
    if(target) target.scrollIntoView({behavior:'smooth'});
    return;
  }
});

// Double-tap like
let lastTap={pos:-1,t:0};
feed.addEventListener('click',e=>{
  const card = e.target.closest('.card');
  if(!card||e.target.closest('.side-actions')||e.target.closest('.sound-badge')) return;
  const pos = card.dataset.pos;
  const now = Date.now();
  if(lastTap.pos===pos && now-lastTap.t<350){
    const lb = card.querySelector('.like-btn');
    if(!likes[pos]) lb.click();
    lastTap={pos:-1,t:0};
  } else {
    lastTap={pos,t:now};
  }
});

// Pause on tap (center)
feed.addEventListener('click',e=>{
  const card = e.target.closest('.card');
  if(!card||e.target.closest('.side-actions')||e.target.closest('.sound-badge')) return;
  const vid = getVideo(card);
  if(vid.paused){vid.play().catch(()=>{});card.classList.remove('paused');}
  else{vid.pause();card.classList.add('paused');}
});

// Nav
document.getElementById('navbar').addEventListener('click',e=>{
  const item = e.target.closest('.nav-item');
  if(!item) return;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  item.classList.add('active');
  const page = item.dataset.page;
  if(page==='home'){
    feed.scrollTo({top:0,behavior:'smooth'});
  }
});

// Autoplay first
window.addEventListener('load',()=>{
  const first = feed.querySelector('.card');
  if(first) playCard(first);
});
</script>
</body>
</html>
