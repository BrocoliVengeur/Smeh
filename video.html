<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ma Vidéothèque</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg:       #0c0c10;
  --surface:  #16161f;
  --card:     #1e1e2a;
  --accent:   #7c5cfc;
  --accent2:  #c084fc;
  --text:     #e8e8f0;
  --muted:    #6b6b80;
  --border:   #2a2a3a;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  /* Espace pour la nav bar */
  padding-bottom: 80px; 
}

/* ── NOUVELLE NAV BAR ── */
#smeh-nav { 
    position:fixed; bottom:0; left:0; right:0; height:60px;
    background:rgba(10,10,10,.95); backdrop-filter:blur(12px);
    border-top:0.5px solid rgba(255,255,255,.07);
    display:flex; align-items:center; justify-content:space-around; z-index:1000; 
}
.snav-item { 
    flex:1; display:flex; flex-direction:column; align-items:center;
    gap:3px; text-decoration:none; color:#555; transition:color .2s; padding:8px 0; 
}
.snav-item.active { color:#f0ede8; }
.snav-item i { font-size:22px; }
.snav-item span { font-size:10px; letter-spacing:.3px; }

/* ── TOP HEADER ── */
.top-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 2rem;
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
}
.top-header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
.top-header h1 span { color: var(--accent); }

/* ── BOUTONS ── */
.btn-add {
  background: var(--accent); color: #fff; border: none;
  padding: .6rem 1.2rem; border-radius: 8px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: .5rem;
  transition: .2s;
}
.btn-add:hover { background: var(--accent2); transform: translateY(-2px); }

/* ── FILTRES ── */
.filters {
  display: flex; gap: .8rem; padding: 0 2rem 1.5rem;
  overflow-x: auto; scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.chip {
  padding: .5rem 1.2rem; border-radius: 50px; background: var(--surface);
  border: 1px solid var(--border); color: var(--muted); cursor: pointer;
  white-space: nowrap; font-size: .9rem; transition: .2s;
}
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── GRID ── */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem; padding: 0 2rem 2rem;
}
.video-card {
  background: var(--card); border-radius: 16px; overflow: hidden;
  border: 1px solid var(--border); cursor: pointer; transition: .3s;
}
.video-card:hover { transform: translateY(-5px); border-color: var(--accent); }
.thumb-area { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
.thumb-area img { width: 100%; height: 100%; object-fit: cover; }
.play-hint {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.2); opacity: 0; transition: .3s;
}
.video-card:hover .play-hint { opacity: 1; }
.play-hint i { font-size: 3rem; color: #fff; }
.duration {
  position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8);
  padding: 2px 6px; border-radius: 4px; font-size: .75rem; font-weight: 600;
}
.video-info { padding: 1rem; }
.video-name { font-size: 1rem; font-weight: 600; margin-bottom: .4rem; line-height: 1.3; }
.video-meta { font-size: .8rem; color: var(--muted); display: flex; align-items: center; gap: .5rem; }

/* ── MODAL ── */
.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 2000; display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.modal.open { display: flex; }
.modal-content { width: 90%; max-width: 1000px; position: relative; }
.close-btn {
  position: absolute; -top: 50px; right: 0; color: #fff; font-size: 2rem;
  cursor: pointer; background: none; border: none;
}
.video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; }

/* ── OVERLAY AJOUT ── */
.yt-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 2100; display: none; align-items: center; justify-content: center;
}
.yt-overlay.open { display: flex; }
.yt-card {
  background: var(--card); padding: 2rem; border-radius: 20px;
  width: 90%; max-width: 450px; border: 1px solid var(--border);
}
.yt-card h2 { margin-bottom: 1.5rem; font-size: 1.2rem; }
.yt-input {
  width: 100%; padding: .8rem; border-radius: 8px; background: var(--bg);
  border: 1px solid var(--border); color: #fff; margin-bottom: 1rem; outline: none;
}
.yt-btns { display: flex; gap: 1rem; margin-top: 1rem; }
.btn-cancel { flex: 1; background: var(--surface); color: var(--text); border: none; padding: .8rem; border-radius: 8px; cursor: pointer; }
.btn-confirm { flex: 2; background: var(--accent); color: #fff; border: none; padding: .8rem; border-radius: 8px; cursor: pointer; }

@media (max-width: 600px) {
  .top-header { padding: 1rem; }
  .video-grid { padding: 0 1rem 2rem; }
}
</style>
</head>
<body>

<nav id="smeh-nav">
    <a class="snav-item" href="index.html"><i class="ti ti-home"></i><span>Accueil</span></a>
    <a class="snav-item" href="scroll.html"><i class="ti ti-photo"></i><span>Tikigram</span></a>
    <a class="snav-item" href="musique.html"><i class="ti ti-music"></i><span>Musique</span></a>
    <a class="snav-item active" href="video.html"><i class="ti ti-video"></i><span>Vidéos</span></a>
    <a class="snav-item" href="geo.html"><i class="ti ti-world"></i><span>Géo Jeu</span></a>
    <a class="snav-item" href="feedback_page.html"><i class="ti ti-bulb"></i><span>Idées</span></a>
</nav>

<header class="top-header">
  <h1>SMEH <span>PLAY</span></h1>
  <button class="btn-add" id="openYtBtn"><i class="ti ti-plus"></i> Ajouter</button>
</header>

<div class="filters" id="filters">
  <div class="chip active" data-cat="all">Tout</div>
  <div class="chip" data-cat="Musique">Musique</div>
  <div class="chip" data-cat="Vlogs">Vlogs</div>
  <div class="chip" data-cat="Tutos">Tutos</div>
  <div class="chip" data-cat="Nature">Nature</div>
</div>

<div class="video-grid" id="videoGrid"></div>

<div class="modal" id="videoModal">
  <div class="modal-content">
    <button class="close-btn" id="closeBtn"><i class="ti ti-x"></i></button>
    <div class="video-wrapper" id="playerWrapper"></div>
  </div>
</div>

<div class="yt-overlay" id="ytOverlay">
  <div class="yt-card">
    <h2>Lien YouTube</h2>
    <input type="text" class="yt-input" id="ytUrl" placeholder="Coller l'URL ici...">
    <input type="text" class="yt-input" id="ytName" placeholder="Titre de la vidéo (optionnel)">
    <select class="yt-input" id="ytCat">
      <option value="Musique">Musique</option>
      <option value="Vlogs">Vlogs</option>
      <option value="Tutos">Tutos</option>
      <option value="Nature">Nature</option>
    </select>
    <div class="yt-btns">
      <button class="btn-cancel" id="ytCancel">Annuler</button>
      <button class="btn-confirm" id="ytConfirm">Ajouter</button>
    </div>
  </div>
</div>

<script>
const videos = [
  { name: "Smeh Ibiza 2026 - Official Aftermovie", youtubeId: "hPr-Yc92fsh", thumb: "https://images.unsplash.com/photo-1514525253344-7814d9196a07?w=600", cat: "Vlogs", duration: "4:15", type: "youtube" },
  { name: "Deep House Mix - Summer Vibes", youtubeId: "M-P4z5z6z7", thumb: "https://images.unsplash.com/photo-1459749411177-042180ce673c?w=600", cat: "Musique", duration: "1:20:44", type: "youtube" },
  { name: "Exploring the Alps 4K", youtubeId: "jNQXAC9IVRw", thumb: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600", cat: "Nature", duration: "12:30", type: "youtube" }
];

const grid = document.getElementById('videoGrid');
const modal = document.getElementById('videoModal');
const wrapper = document.getElementById('playerWrapper');
const ytOverlay = document.getElementById('ytOverlay');
let currentCat = 'all';

function renderVideos(list) {
  grid.innerHTML = list.map((v, i) => `
    <div class="video-card" onclick="openVideo('${v.youtubeId}')">
      <div class="thumb-area">
        <img src="${v.thumb}" alt="${v.name}">
        <div class="play-hint"><i class="ti ti-player-play-filled"></i></div>
        <div class="duration">${v.duration || '??'}</div>
      </div>
      <div class="video-info">
        <div class="video-name">${v.name}</div>
        <div class="video-meta">
          <i class="ti ti-folder"></i> ${v.cat}
        </div>
      </div>
    </div>
  `).join('');
}

function openVideo(id) {
  wrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  modal.classList.add('open');
}

document.getElementById('closeBtn').addEventListener('click', () => {
  modal.classList.remove('open');
  wrapper.innerHTML = '';
});

// Filtres
document.getElementById('filters').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    currentCat = e.target.dataset.cat;
    applyFilter();
  }
});

function applyFilter() {
  const filtered = currentCat === 'all' ? videos : videos.filter(v => v.cat === currentCat);
  renderVideos(filtered);
}

// Ajout YouTube
document.getElementById('openYtBtn').addEventListener('click', () => ytOverlay.classList.add('open'));
document.getElementById('ytCancel').addEventListener('click', () => ytOverlay.classList.remove('open'));

document.getElementById('ytConfirm').addEventListener('click', () => {
  const url = document.getElementById('ytUrl').value;
  const id = extractId(url);
  if (id) {
    videos.push({
      name: document.getElementById('ytName').value || "Nouvelle Vidéo",
      youtubeId: id,
      thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`,
      cat: document.getElementById('ytCat').value,
      duration: "YT",
      type: "youtube"
    });
    ytOverlay.classList.remove('open');
    applyFilter();
  }
});

function extractId(url) {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
}

renderVideos(videos);
</script>

</body>
</html>
